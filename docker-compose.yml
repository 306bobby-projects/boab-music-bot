services:
  musicbot:
    image: ghcr.io/${GITHUB_REPOSITORY:-306bobby-projects/boab-music-bot}:latest
    build: .
    container_name: discord-music-bot
    restart: always
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
    volumes:
      - ./server_configs.json:/app/server_configs.json
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
